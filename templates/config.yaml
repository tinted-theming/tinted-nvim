    tinted8-builder: "~0.2.0"
    tinted8-styling: "~0.2.0"

tinted8.vim:
  filename: colors/{{ scheme.system }}-{{ scheme.slug }}.vim
  supported-systems: [tinted8]
  supports:
    tinted8-builder: "~0.2.0"
    tinted8-styling: "~0.2.0"
